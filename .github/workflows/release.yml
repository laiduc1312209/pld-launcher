name: Build and Release

on:
  push:
    tags:
      - 'v*' # Run when a tag matching v* is pushed (e.g. v1.2.0)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --icon=icon.ico --hidden-import six --hidden-import _bcrypt --collect-all boto3 --collect-all botocore --collect-all bcrypt main.py
          Move-Item -Path "dist\main.exe" -Destination "PLD-Launcher.exe"

      - name: Zip Release
        run: |
          Compress-Archive -Path "PLD-Launcher.exe" -DestinationPath "PLD-Launcher.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PLD-Launcher.zip
          draft: false
          prerelease: false
          generate_release_notes: true
